<div class="product-detail">
  <app-header></app-header>
  <main class="product-detail__main">
    <button class="product-detail__back" aria-label="Volver al catálogo">
      <svg class="product-detail__back-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Volver
    </button>

    <div class="product-detail__loading" style="display: none;">Cargando producto...</div>
    
    <div class="product-detail__content" style="display: none;">
      <div class="product-detail__image-container">
        <img class="product-detail__image" src="" alt="">
      </div>
      
      <div class="product-detail__info">
        <h2 class="product-detail__title"></h2>
        <p class="product-detail__price"></p>
        
        <div class="product-detail__divider"></div>
        
        <div class="product-detail__description-wrapper">
          <h3 class="product-detail__description-heading">Descripción</h3>
          <p class="product-detail__description"></p>
        </div>
        
        <div class="product-detail__actions">
          <button class="product-detail__add">
            <svg class="product-detail__add-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            Agregar al carrito
          </button>
          <div class="product-detail__message" style="display: none;">✓ Producto agregado al carrito</div>
        </div>
      </div>
    </div>
  </main>
</div>
