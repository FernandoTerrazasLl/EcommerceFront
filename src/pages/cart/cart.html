<div class="cart">
  <app-header></app-header>
  <main class="cart__main">
    <button class="cart__back" aria-label="Seguir comprando">
      <svg class="cart__back-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Seguir comprando
    </button>
    
    <h2 class="cart__title">Tu bolsa de compra</h2>

    <div class="cart__content">
      <div class="cart__items">
        <!-- Injected via JS -->
      </div>
      
      <div class="cart__summary">
        <h3 class="cart__summary-title">Resumen de compra</h3>
        <div class="cart__summary-content">
          <!-- Injected via JS -->
        </div>
        <button class="cart__checkout" disabled>Proceder al pago</button>
      </div>
    </div>
  </main>
</div>
